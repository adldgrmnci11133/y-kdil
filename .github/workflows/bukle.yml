name: APK Oluşturucu (Bukle)

on:
  push:
    branches:
      - main # Hangi branch'e yükleme yapınca çalışmasını istiyorsan buraya yaz (master/main)
  workflow_dispatch: # Manuel olarak da başlatabilmen için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla (Checkout)
        uses: actions/checkout@v4

      - name: Java Kurulumu (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Yaygın ve stabil bir dağıtım
          java-version: '17'
          cache: 'gradle'

      - name: Gradle'a Çalıştırma Yetkisi Ver
        run: chmod +x gradlew

      - name: APK Derle (Build)
        run: ./gradlew assembleDebug

      - name: Oluşan APK'yı Yükle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Bukle-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
